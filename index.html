
<!doctype html><html lang="pl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rodzinna Przygoda – Budzyń</title>
<link rel="stylesheet" href="css/style.css">
</head><body>
<div class="wrap">
  <div class="hero">
    <div class="cover"><img src="assets/cover.jpg" alt="cover"></div>
    <div class="hero-content">
      <div class="panel">
        <h2>Rodzinna Przygoda – Budzyń</h2>
        <p>Wybierz graczy (z Playmobil avatarami), włącz muzykę i start!</p>
        <div class="row">
          <button class="btn primary" id="toggleMusic">🔈 Muzyka</button>
          <a class="btn secondary" href="#players">Wybierz graczy</a>
        </div>
      </div>
      <div class="panel">
        <strong>Instrukcja</strong>
        <div class="small">
          Avatary są w <code>assets/avatars/</code>. Podmień pliki tymi samymi nazwami (PNG).<br>
          Muzyka: wrzuć 3 pliki do <code>assets/audio/track1.mp3</code>, <code>track2.mp3</code>, <code>track3.mp3</code>.
        </div>
      </div>
    </div>
  </div>

  <a id="players"></a>
  <div class="panel">
    <h3>Wybór graczy (2–4)</h3>
    <div class="cards" id="cards"></div>
    <div class="row" style="margin-top:10px">
      <button class="btn primary" id="startBtn" disabled>Start!</button>
    </div>
  </div>
</div>

<script>
const PEOPLE = [{"key": "luca", "name": "Luca", "color": "#1f2a44"}, {"key": "sylwia", "name": "Sylwia", "color": "#ff7a00"}, {"key": "oli", "name": "Oli", "color": "#e10600"}, {"key": "vicky", "name": "Vicky", "color": "#ff5fa2"}, {"key": "leon", "name": "Leon", "color": "#8a8a8a"}, {"key": "nela", "name": "Nela", "color": "#dc143c"}];
const SELECTED = new Set();
function cardHtml(p){
  return `<div class="cardP" data-key="${p.key}">
    <div class="avatar"><img src="assets/avatars/${p.key}.png" alt="${p.name}"></div>
    <div><div><b>${p.name}</b></div><div class="small">Kolor: ${p.color}</div></div>
  </div>`;
}
function renderCards(){
  const box=document.getElementById('cards'); box.innerHTML=PEOPLE.map(cardHtml).join('');
  box.querySelectorAll('.cardP').forEach(el=>{ el.onclick=()=>{ const k=el.dataset.key; if(SELECTED.has(k)) SELECTED.delete(k); else SELECTED.add(k); el.classList.toggle('selected'); document.getElementById('startBtn').disabled = !(SELECTED.size>=2 && SELECTED.size<=4); }; });
}
renderCards();

let musicOn=false;
document.getElementById('toggleMusic').onclick=()=>{ musicOn=!musicOn; localStorage.setItem('music', musicOn?'on':'off'); document.getElementById('toggleMusic').textContent = musicOn?'🔊 Muzyka':'🔈 Muzyka'; };

document.getElementById('startBtn').onclick=()=>{
  localStorage.setItem('players', JSON.stringify([...SELECTED]));
  location.href = 'game.html';
};
</script>
</body></html>
